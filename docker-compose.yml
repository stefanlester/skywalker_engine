version: '3'

services:

#  start Postgres, and ensure that data is stored to a mounted volume
  postgres:
    image: 'postgres:13.4'
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skywalker
    volumes:
      - ./db-data/postgres/:/var/lib/postgresql/data/

  #  start Redis, and ensure that data is stored to a mounted volume
  redis:
    image: 'redis:alpine'
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - ./db-data/redis/:/data

  #  start sftp and webdav, and admin interface; ensure that data is stored to a mounted volume
  sftp:
    image: 'drakkan/sftpgo:latest'
    ports:
      - "8080:8080"
      - "2022:2022"
      - "10080:10080"
    restart: always
    environment:
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 10080
    volumes:
      - ./db-data/sftp/:/mnt/data/
      - ./db-data/home/:/var/lib/sftpgo

  #  start SeaweedFS, an actively maintained S3-compatible object store
  #  (the MinIO community edition is no longer maintained upstream).
  #  The S3 API listens on 8333 in the container, mapped to host port 9000
  #  so the default MINIO_ENDPOINT=127.0.0.1:9000 keeps working unchanged.
  #  Credentials live in s3.json (root/password, matching .env defaults).
  #  Create the demo bucket once with:
  #    docker compose exec seaweedfs sh -c 'echo "s3.bucket.create -name testbucket" | weed shell'
  seaweedfs:
    image: 'chrislusf/seaweedfs:latest'
    command: 'server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json'
    ports:
      - "9000:8333"
    restart: always
    volumes:
      - ./db-data/seaweedfs/:/data
      - ./s3.json:/etc/seaweedfs/s3.json:ro
